<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Dải màu Gradient xanh sáng chuẩn iOS (Đã chỉnh sát màu gốc) -->
    <linearGradient id="bgLight" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3FA9F5" />
      <stop offset="100%" stop-color="#0B5EE6" />
    </linearGradient>
  </defs>
  
  <!-- Hình nền chuẩn Apple Squircle -->
  <rect x="0" y="0" width="512" height="512" rx="115" ry="115" fill="url(#bgLight)" />
  
  <!-- Khung viền điện thoại (Dạng path để tạo khoảng trống đứt đoạn bên phải cho cụm NAS) -->
  <path d="
    M 341 299
    L 341 382
    A 36 36 0 0 1 305 418
    L 207 418
    A 36 36 0 0 1 171 382
    L 171 130
    A 36 36 0 0 1 207 94
    L 305 94
    A 36 36 0 0 1 341 130
    L 341 165
  " fill="none" stroke="#ffffff" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Phần cắt tai thỏ (Notch) -->
  <path d="M 226 87 v 16 a 12 12 0 0 0 12 12 h 36 a 12 12 0 0 0 12 -12 v -16 z" fill="#ffffff" />
  
  <!-- 3 Khay ổ cứng máy chủ (Server Bars) - Lệch sang phải -->
  <rect x="202" y="155" width="170" height="42" rx="21" fill="#ffffff" />
  <rect x="202" y="211" width="170" height="42" rx="21" fill="#ffffff" />
  <rect x="202" y="267" width="170" height="42" rx="21" fill="#ffffff" />
  
  <!-- Các đèn tín hiệu (Cutouts) - Nằm bên góc trái cụm NAS -->
  <circle cx="223" cy="176" r="6" fill="url(#bgLight)" />
  <circle cx="223" cy="232" r="6" fill="url(#bgLight)" />
  <circle cx="223" cy="288" r="6" fill="url(#bgLight)" />
  
  <!-- Biểu tượng sóng tín hiệu (Online) màu xanh lá - Căn giữa so với viền điện thoại -->
  <g fill="none" stroke="#30D158" stroke-width="5" stroke-linecap="round">
    <circle cx="256" cy="378" r="3.5" fill="#30D158" stroke="none" />
    <path d="M 244 366 A 14 14 0 0 1 268 366" />
    <path d="M 232 354 A 28 28 0 0 1 280 354" />
  </g>
</svg>